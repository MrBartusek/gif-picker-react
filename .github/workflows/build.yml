name: Build and Lint

on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master

jobs:
  lint:
    name: '🛠️ Build'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@v3

      - name: 📦 Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: 🛠️ Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build
        run: pnpm build

      - name: 🧹 Lint with EsLint
        run: pnpm lint
